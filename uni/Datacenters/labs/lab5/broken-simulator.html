<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spine-Leaf Interactive Lab</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #333; line-height: 1.5; padding: 20px; background: #f9f9f9; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .zone-label { font-size: 12px; font-weight: bold; fill: #888; text-transform: uppercase; }
        .node { cursor: pointer; transition: transform 0.2s; }
        .node:hover { transform: scale(1.05); }
        .c-purple { fill: #8e44ad; }
        .c-teal { fill: #16a085; }
        .c-gray { fill: #7f8c8d; }
        .link { stroke: #bdc3c7; stroke-width: 1; opacity: 0.35; transition: all 0.3s; }
        .link-active { stroke: #1D9E75 !important; stroke-width: 3 !important; opacity: 1 !important; }
        .node-active { filter: brightness(1.2); stroke: #2c3e50; stroke-width: 2px; }
        
        /* Simulator Styles */
        #simulator { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #f0f2f5; padding: 15px; border-radius: 8px; }
        select, button { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        button { cursor: pointer; background: #16a085; color: white; border: none; font-weight: bold; }
        button#clearBtn { background: #e74c3c; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: #16a085; }
        #log { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h2>1. Static Topology Diagram</h2>
    <p><em>Click any node to explore its role in the fabric.</em></p>
    
    <svg viewBox="0 0 800 450" id="staticTopo">
        <rect x="10" y="20" width="780" height="90" fill="none" stroke="#ddd" stroke-dasharray="5,5" rx="10" />
        <text x="20" y="40" class="zone-label">Spine Layer (L3 / ECMP)</text>
        
        <rect x="10" y="130" width="780" height="110" fill="none" stroke="#ddd" stroke-dasharray="5,5" rx="10" />
        <text x="20" y="150" class="zone-label">Leaf Layer (ToR Switches)</text>
        
        <rect x="10" y="260" width="780" height="150" fill="none" stroke="#ddd" stroke-dasharray="5,5" rx="10" />
        <text x="20" y="280" class="zone-label">Servers / Endpoints</text>

        <text x="500" y="435" font-size="13" font-style="italic" fill="#666">Note: Always exactly 2 hops between any two servers (cross-leaf)</text>

        <g transform="translate(20, 420)">
            <rect width="15" height="15" class="c-purple" /> <text x="20" y="12" font-size="12">Spine</text>
            <rect x="70" width="15" height="15" class="c-teal" /> <text x="90" y="12" font-size="12">Leaf</text>
            <rect x="140" width="15" height="15" class="c-gray" /> <text x="160" y="12" font-size="12">Server</text>
        </g>

        <g stroke="#eee" stroke-width="1">
            <line x1="200" y1="180" x2="300" y2="70" /> <line x1="200" y1="180" x2="500" y2="70" />
            <line x1="333" y1="180" x2="300" y2="70" /> <line x1="333" y1="180" x2="500" y2="70" />
            <line x1="466" y1="180" x2="300" y2="70" /> <line x1="466" y1="180" x2="500" y2="70" />
            <line x1="600" y1="180" x2="300" y2="70" /> <line x1="600" y1="180" x2="500" y2="70" />
        </g>

        <g onclick="sendPrompt('Spine Switch')">
            <rect x="260" y="45" width="80" height="45" rx="5" class="node c-purple" />
            <text x="300" y="73" fill="white" text-anchor="middle" font-size="12">Spine 1</text>
            <rect x="460" y="45" width="80" height="45" rx="5" class="node c-purple" />
            <text x="500" y="73" fill="white" text-anchor="middle" font-size="12">Spine 2</text>
        </g>

        <g onclick="sendPrompt('Leaf Switch')">
            <rect x="160" y="160" width="80" height="40" rx="3" class="node c-teal" /> <text x="200" y="185" fill="white" text-anchor="middle" font-size="11">Leaf 1</text>
            <rect x="293" y="160" width="80" height="40" rx="3" class="node c-teal" /> <text x="333" y="185" fill="white" text-anchor="middle" font-size="11">Leaf 2</text>
            <rect x="426" y="160" width="80" height="40" rx="3" class="node c-teal" /> <text x="466" y="185" fill="white" text-anchor="middle" font-size="11">Leaf 3</text>
            <rect x="560" y="160" width="80" height="40" rx="3" class="node c-teal" /> <text x="600" y="185" fill="white" text-anchor="middle" font-size="11">Leaf 4</text>
        </g>
    </svg>

    <div id="simulator">
        <h2>2. Live Traffic Simulator</h2>
        <div class="controls">
            <label>Source: <select id="srcSrv"></select></label>
            <label>Destination: <select id="dstSrv"></select></label>
            <button onclick="runSimulation()">Send Traffic</button>
            <button id="clearBtn" onclick="resetSim()">Clear</button>
        </div>

        <svg viewBox="0 0 800 350" id="simCanvas" style="background: #fcfcfc; border: 1px solid #eee;">
            </svg>

        <div class="stats-grid">
            <div class="stat-card">Hop Count <span id="statHops" class="stat-val">-</span></div>
            <div class="stat-card">Spine Chosen <span id="statSpine" class="stat-val">-</span></div>
            <div class="stat-card">Flows Sent <span id="statFlow
